<!-- specs/dummy-study/frontend/login-page.html -->
<main class="flex items-center justify-center min-h-screen bg-gray-50">

  <div class="w-full max-w-sm p-6 bg-white rounded-lg shadow">
    <h1 class="text-2xl font-bold mb-6 text-center">로그인</h1>

    <div data-action="Login" class="space-y-4">
      <input data-field="Email" type="email" placeholder="이메일" class="w-full px-3 py-2 border rounded" />
      <input data-field="Password" type="password" placeholder="비밀번호" class="w-full px-3 py-2 border rounded" />
      <button type="submit" class="w-full py-2 bg-blue-500 text-white rounded">로그인</button>
    </div>
  </div>

</main>
