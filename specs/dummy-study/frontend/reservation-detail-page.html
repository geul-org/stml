<!-- specs/dummy-study/frontend/reservation-detail-page.html -->
<main class="max-w-2xl mx-auto p-6">

  <article data-fetch="GetReservation" data-param-reservation-id="route.ReservationID">

    <header class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">예약 상세</h1>
      <span data-bind="reservation.Status" class="px-3 py-1 text-sm rounded bg-gray-100"></span>
    </header>

    <dl class="space-y-3">
      <div class="flex justify-between">
        <dt class="text-gray-500">스터디룸</dt>
        <dd data-bind="reservation.RoomID" class="font-semibold"></dd>
      </div>
      <div class="flex justify-between">
        <dt class="text-gray-500">시작</dt>
        <dd data-bind="reservation.StartAt"></dd>
      </div>
      <div class="flex justify-between">
        <dt class="text-gray-500">종료</dt>
        <dd data-bind="reservation.EndAt"></dd>
      </div>
    </dl>

    <footer data-state="canCancel" class="mt-8 pt-4 border-t">
      <button data-action="CancelReservation" data-param-reservation-id="route.ReservationID"
              class="w-full py-2 bg-red-500 text-white rounded">
        예약 취소
      </button>
    </footer>

  </article>

</main>
