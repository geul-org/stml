<!-- specs/dummy-study/frontend/my-reservations-page.html -->
<main class="max-w-4xl mx-auto p-6">

  <header class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">내 예약</h1>
  </header>

  <section data-fetch="ListMyReservations" data-paginate data-sort="StartAt:desc" data-filter="Status" class="mb-8">
    <ul data-each="reservations" class="space-y-3">
      <li class="flex justify-between items-center p-4 border rounded">
        <div>
          <span data-bind="RoomID" class="font-semibold"></span>
          <span data-bind="StartAt" class="ml-2 text-sm text-gray-500"></span>
          <span class="text-sm text-gray-400">~</span>
          <span data-bind="EndAt" class="text-sm text-gray-500"></span>
        </div>
        <span data-bind="Status" class="px-2 py-1 text-sm rounded bg-gray-100"></span>
      </li>
    </ul>
    <p data-state="reservations.empty" class="text-gray-400 text-center py-8">예약이 없습니다</p>
  </section>

  <section class="p-6 bg-gray-50 rounded-lg">
    <h2 class="text-lg font-semibold mb-4">새 예약</h2>
    <div data-action="CreateReservation" class="space-y-4">
      <input data-field="RoomID" type="number" placeholder="스터디룸 번호" class="w-full px-3 py-2 border rounded" />
      <div class="grid grid-cols-2 gap-4">
        <div data-component="DatePicker" data-field="StartAt" />
        <div data-component="DatePicker" data-field="EndAt" />
      </div>
      <button type="submit" class="w-full py-2 bg-blue-500 text-white rounded">예약하기</button>
    </div>
  </section>

</main>
